name: Deploy API to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install API dependencies
        run: cd api && npm ci

      - name: Build API
        run: cd api && npm run build

      - name: Deploy to Vercel Production
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test — upload endpoint
        run: |
          RESULT=$(curl -s -X POST https://api.inkdprotocol.com/v1/upload \
            -H "Content-Type: application/json" \
            -d '{"data":"aGVsbG8=","contentType":"text/plain","filename":"smoke-test.txt"}')
          echo "Response: $RESULT"
          echo "$RESULT" | grep -q '"hash":"ar://' || (echo "SMOKE TEST FAILED — upload endpoint broken!" && exit 1)
