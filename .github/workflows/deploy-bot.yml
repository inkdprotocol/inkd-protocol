name: Deploy Telegram Bot

on:
  push:
    branches: [main]
    paths:
      - 'agents/telegram-bot/**'

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BOT_DEPLOY_HOST }}
          username: root
          key: ${{ secrets.BOT_DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /root/inkd-protocol-repo

            # Stash only tracked source changes (never touches .env or data/)
            git checkout -- agents/telegram-bot/src agents/telegram-bot/package.json agents/telegram-bot/package-lock.json agents/telegram-bot/tsconfig.json .github 2>/dev/null || true
            git pull origin main

            cd agents/telegram-bot

            # Backup current dist before building
            if [ -d dist ]; then
              rm -rf dist.bak
              cp -r dist dist.bak
            fi

            # Install + build
            npm install
            npm run build

            # Only restart if build succeeded (set -e handles this, but be explicit)
            pm2 restart inkd-bot

            # Remove backup on success
            rm -rf dist.bak

            echo "Deploy done: $(git log --oneline -1)"
